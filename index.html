<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>심리 진단 통합 시스템</title>
    <style>
        :root { --primary: #3730a3; --bg: #f8fafc; --white: #ffffff; }
        /* 터치 반응 속도 개선 및 하이라이트 제거 */
        * { box-sizing: border-box; font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding: 20px; color: #334155; }
        .container { max-width: 650px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .step { display: none; }
        .step.active { display: block; }
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        
        /* [수정] 아이폰에서 클릭 인식을 방해하는 요소를 제거하고 터치 영역을 강화함 */
        .mode-card { 
            border: 2px solid #e2e8f0; padding: 20px; border-radius: 15px; text-align: center; 
            cursor: pointer; transition: 0.3s; background: #fff; 
            touch-action: manipulation; position: relative; z-index: 1;
        }
        .mode-card.selected { border-color: var(--primary); background: #eef2ff; box-shadow: 0 4px 12px rgba(55,48,163,0.1); }
        .mode-card h3, .mode-card p { pointer-events: none; } /* 글자가 클릭을 방해하지 못하게 설정 */

        .info-group { margin-bottom: 20px; }
        .info-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .info-group input, .info-group select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; background: white; color: #334155; -webkit-appearance: none; }
        .fixed-guide { position: sticky; top: 0; background: var(--primary); color: white; padding: 12px; border-radius: 10px; display: flex; justify-content: space-around; font-size: 0.75em; z-index: 100; margin-bottom: 20px; }
        .q-box { border-bottom: 1px solid #f1f5f9; padding: 25px 0; }
        .q-text { font-weight: 500; margin-bottom: 15px; line-height: 1.6; word-break: keep-all; }
        .q-ops { display: flex; justify-content: space-between; gap: 6px; }
        .q-ops input[type="radio"] { display: none; }
        .q-ops label { width: 44px; height: 44px; border: 1.5px solid #cbd5e1; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 600; touch-action: manipulation; }
        .q-ops input[type="radio"]:checked + label { background: var(--primary); color: white; border-color: var(--primary); }
        .btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.05em; margin-top: 20px; touch-action: manipulation; }
        .btn-home { background: #64748b; margin-top: 10px; }
        textarea { width: 100%; height: 150px; margin: 20px 0; padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: #f9fafb; font-family: monospace; resize: none; font-size: 0.85em; }
        .copy-msg { display: none; text-align: center; color: #22c55e; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <section id="step1" class="step active">
        <h2 style="text-align:center;">심리 진단 서비스</h2>
        <div class="mode-selector">
            <div class="mode-card" id="mode50"><h3>자아상태</h3><p>50문항</p></div>
            <div class="mode-card" id="mode40"><h3>인생태도</h3><p>40문항</p></div>
        </div>
        <div class="info-group"><label>성함</label><input type="text" id="u_name" placeholder="이름 입력"></div>
        <div class="info-group"><label>나이</label><input type="number" id="u_age" placeholder="나이 입력" inputmode="numeric"></div>
        <div class="info-group"><label>성별</label><select id="u_gender"><option value="남">남성</option><option value="여">여성</option></select></div>
        <div class="info-group"><label>연락처</label><input type="tel" id="u_tel" placeholder="010-0000-0000"></div>
        <button class="btn" id="startBtn">검사 시작하기</button>
    </section>

    <section id="step2" class="step">
        <div id="test_title" style="text-align:center; font-weight:bold; margin-bottom:15px; color:var(--primary);"></div>
        <div class="fixed-guide"><span>1:전혀아니다</span><span>2:아니다</span><span>3:보통</span><span>4:그렇다</span><span>5:매우그렇다</span></div>
        <div id="q_list"></div>
        <button class="btn" id="finishBtn">결과 생성하기</button>
    </section>

    <section id="step3" class="step">
        <h2 style="text-align:center;">검사가 완료되었습니다</h2>
        <textarea id="resCode" readonly></textarea>
        <button class="btn" id="copyBtn">분석 코드 복사하기</button>
        <button class="btn btn-home" id="homeBtn">처음으로 돌아가기</button>
        <p class="copy-msg" id="copyMsg">✓ 복사되었습니다!</p>
    </section>
</div>

<script>
    var selectedMode = null;
    // (qs50, qs40 문항 데이터는 사용자님 코드의 것을 그대로 유지하세요)
    var qs50 = ["사전에 계획을 잘 세우고 행동에 옮긴다.", "남의 잘못에 대해 그냥 넘어가지 않고 비판을 하거나 충고를 한다.", "밝게 행동하고 유머러스한 말을 하며 장난을 잘 친다.", "타인의 실수에 대하여 너그럽게 행동한다.", "다른 사람들과 논리적으로 차분하게 대화한다.", "어른들이나 윗사람 앞에서 우물쭈물한다.", "대화할 때 상대방의 말을 가로막고 내 생각을 먼저 말한다.", "슬프거나 기분이 울적할 때가 종종 있다.", "상대방의 실수를 지적하고 고치려고 한다.", "기쁘거나 화가 날 때 감추지 않고 바로 표현한다.", "남에게 받기보다는 베푸는 것을 좋아한다.", "어떤 일이든 감정에 치우치지 않고 있는 사실에 근거하여 판단한다.", "다른 사람의 표정을 보고 행동하는 버릇이 있다.", "나보다는 타인의 입장을 먼저 생각한다.", "삐뚤어지거나 잘못된 것이 있으면 즉시 지적한다.", "화려한 색깔의 옷이나 신발 등을 좋아한다.", "다른 사람의 입장을 헤아려 먼저 양보를 잘한다.", "창의적이고 예술적 감각이 뛰어나다.", "나 자신의 생각을 양보하지 않고 끝까지 주장한다.", "미래에 대하여 철저하게 계획하고 행동한다.", "어떤 일을 할 때 적극적으로 나서지 못한다.", "재미있는 말과 행동으로 분위기를 잘 이끌어 간다.", "내 가치관에 입각하여 내 생각을 서슴없이 말한다.", "다른 사람을 헐뜯는 것보다는 칭찬하기를 좋아한다.", "다른 사람의 의견보다는 내 의견을 우선적으로 내세운다.", "어떤 행동을 하기 전에 깊이 생각을 한다.", "매사를 긍정적으로 생각하며 즐겁게 지낸다.", "남을 잘 이해하고 배려한다.", "미래의 일에 대해 예측하기를 좋아한다.", "매사에 조심스러우며 소극적으로 행동한다.", "다른 사람을 무시하는 말을 잘한다.", "남보다 부족하고 못 하는 것이 많다고 생각한다.", "신이 날 때는 도가 지나쳐 실수를 할 때도 있다.", "어떤 일이든 시작하면 계획한 대로 차근차근 진행해 나간다.", "다른 사람을 비난하기보다는 수용하고 공감한다.", "꼼꼼하고 계획적이며 계산적인 사람이라는 소리를 듣는다.", "어떤 일을 추진할 때 과감하게 행동하지 못한다.", "노래를 부르거나 춤추는 것을 좋아한다.", "주어진 일을 정확하고 분명하게 처리한다.", "다른 사람 돌보는 일을 좋아한다.", "싫은 것은 싫다고 분명하게 그 자리에서 말하지 못한다.", "'반드시', '당연히'라는 말을 자주 사용한다.", "다른 사람들에게 스스럼없이 감정 표현을 잘한다.", "'~해', '~하지 않으면 안 돼'라는 표현을 자주 사용한다.", "다른 사람의 단점보다는 장점을 더 잘 본다.", "공부, 일, 업무, 아르바이트 같은 것을 효율적으로 잘 처리한다.", "다른 사람과 비교하면서 열등감에 빠질 때가 많다.", "농담이나 짓궂은 행동을 잘한다.", "나 자신의 감정(느낌)을 억누르거나 무시해 버리는 경우가 많다.", "친구나 나보다 나이가 적은 사람들을 잘 챙긴다."];
    var qs40 = ["다른 사람에 대한 평가 기준이 엄격하다.","다른 사람도 나만큼 잘 할 수 있다고 생각한다.","내가 잘못을 하거나 실수를 하는 경우에도 나 자신을 긍정적으로 바라본다.","나 자신을 쓸모없는 인간이라고 생각한다.","다른 사람이 친절을 베풀어도 일단 의심해 본다.","사람들은 누구나 실수나 실패를 할 수 있다.","나는 무슨 일이든 '하면 된다'라고 생각하는 사람이다.","나는 자신의 행동이나 말에 자신감을 갖지 못한다.","나는 상대방을 비난하거나 꼼짝 못 하게 하려고 할 때가 있다.","다른 사람을 진심으로 격려한다.","'당신과 같이 있으면 즐겁다'라는 말을 자주 듣는다.","나 자신의 용모나 외모에 자신이 없다.","다른 사람의 장점보다 단점을 잘 찾아낸다.","상대의 좋지 않은 면을 보더라도 나는 그 사람과 사귈 수 있다고 생각한다.","나의 속마음을 다른 사람에게 솔직하게 표현한다.","'나는 쓸모없는 사람이야!'라고 생각하는 경우가 종종 있다.","나는 성격과 취향이 맞지 않는 사람과는 사귀고 싶지 않다.","누구든지 자신의 의견이나 의사를 말할 권리가 있다.","나는 매사에 적극적으로 활동하는 편이다.","나는 무엇을 해도 잘 되지 않는다는 느낌이 들 때가 종종 있다.","다른 사람의 결점이 하나라도 눈에 띄면 그 사람의 전부가 싫어진다.","나에 대해 부정적인 생각을 가진 사람과도 대화할 수 있다.","나 자신의 얼굴이나 모습에 매력이 있다고 생각한다.","내가 이 세상에 태어난 것에 대해 그다지 환영받지 못했다고 생각한다.","모르는 사람을 만나면 일단 의심부터 한다.","사람들은 모두 존중받을 권리가 있다.","나 자신에게는 아직 숨은 재능이 많이 있다고 생각한다.","나는 결심한 것을 실천하는 것이 쉽지 않다.","다툼이나 싸움이 일어나면 상대방을 먼저 탓한다.","다른 사람의 일이 잘될 때 진심으로 박수를 쳐준다.","다른 사람들 앞에서 불안해하거나 긴장하지 않고 자연스럽게 말할 수 있다.","어떤 기회가 주어졌을 때 능력이 부족하다는 생각으로 포기하는 경우가 종종 있다.","상대방이 내 기대에 못 미치면 화가 난다.","모든 사람은 소중한 존재로 이 세상에 태어났다고 생각한다.","나는 실패를 두려워하지 않는다.","나 자신이 불필요한 존재라고 생각할 때가 더러 있다.","나는 평소 다른 사람을 그다지 칭찬하지 않는다.","다른 사람의 행동이나 사고방식이 나와 다르다 할지라도 싫어하지는 않는다.","나는 다른 사람으로부터 신뢰받는 사람이라고 생각한다.","나는 나 자신을 그다지 존중하지 않는다."];

    // [중요] 아이폰 전용 클릭 리스너 설정
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('mode50').addEventListener('click', function() { selectMode(50); });
        document.getElementById('mode40').addEventListener('click', function() { selectMode(40); });
        document.getElementById('startBtn').addEventListener('click', function() { goStep(2); });
        document.getElementById('finishBtn').addEventListener('click', finish);
        document.getElementById('copyBtn').addEventListener('click', copyCode);
        document.getElementById('homeBtn').addEventListener('click', goHome);
    });

    function selectMode(m) {
        selectedMode = m;
        document.querySelectorAll('.mode-card').forEach(function(c) { c.classList.remove('selected'); });
        document.getElementById('mode' + m).classList.add('selected');
    }

    function goStep(n) {
        if (n === 2) {
            if (!selectedMode) { alert("검사항목을 선택해 주세요."); return; }
            if (!document.getElementById('u_name').value.trim()) { alert("성함을 입력해 주세요."); return; }
        }
        document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
        document.getElementById('step' + n).classList.add('active');
        if (n === 2) renderQuestions();
        window.scrollTo(0, 0);
    }

    function renderQuestions() {
        var container = document.getElementById('q_list');
        var list = (selectedMode === 50) ? qs50 : qs40;
        document.getElementById('test_title').innerText = (selectedMode === 50) ? "자아상태 검사" : "인생태도 검사";
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var num = i + 1;
            html += '<div class="q-box"><div class="q-text">' + num + '. ' + list[i] + '</div><div class="q-ops">';
            for (var v = 1; v <= 5; v++) {
                var id = 'q' + num + '_' + v;
                html += '<input type="radio" name="q' + num + '" id="' + id + '" value="' + v + '"><label for="' + id + '">' + v + '</label>';
            }
            html += '</div></div>';
        }
        container.innerHTML = html;
    }

    function finish() {
        var scores = (selectedMode === 50) ? { CP: 0, NP: 0, A: 0, FC: 0, AC: 0 } : { U_P: 0, U_N: 0, O_P: 0, O_N: 0 };
        var keys50 = { CP: [2,7,9,15,19,23,25,31,42,44], NP: [4,11,14,17,24,28,35,40,45,50], A: [1,5,12,20,26,29,34,36,39,46], FC: [3,10,16,18,22,27,33,38,43,48], AC: [6,8,13,21,30,32,37,41,47,49] };
        var keys40 = { O_P: [2,6,10,14,18,22,26,30,34,38], O_N: [1,5,9,13,17,21,25,29,33,37], U_P: [3,7,11,15,19,23,27,31,35,39], U_N: [4,8,12,16,20,24,28,32,36,40] };
        var keys = (selectedMode === 50) ? keys50 : keys40;

        for (var i = 1; i <= selectedMode; i++) {
            var sel = document.querySelector('input[name="q' + i + '"]:checked');
            if (!sel) { alert(i + "번 문항이 누락되었습니다."); return; }
            var v = parseInt(sel.value);
            for (var k in keys) { if (keys[k].indexOf(i) !== -1) scores[k] += v; }
        }

        var data = { n: document.getElementById('u_name').value, a: document.getElementById('u_age').value, g: document.getElementById('u_gender').value, t: document.getElementById('u_tel').value, d: new Date().toLocaleDateString(), s: scores, ver: selectedMode, type: (selectedMode === 50) ? "EGO" : "LP" };
        document.getElementById('resCode').value = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        goStep(3);
    }

    function copyCode() {
        var el = document.getElementById('resCode');
        el.select();
        document.execCommand('copy');
        document.getElementById('copyMsg').style.display = 'block';
        setTimeout(function() { document.getElementById('copyMsg').style.display = 'none'; }, 2000);
    }

    function goHome() {
        if (!confirm("처음으로 돌아가시겠습니까?")) return;
        selectedMode = null;
        document.querySelectorAll('.mode-card').forEach(function(c) { c.classList.remove('selected'); });
        document.getElementById('u_name').value = ""; document.getElementById('u_age').value = ""; document.getElementById('u_tel').value = "";
        goStep(1);
    }
</script>
</body>
</html>
